# Traefik override — for a host that already runs a Traefik reverse proxy
# (e.g. the galaxy-catalog stack on the "linode" box). Traefik reaches the app
# over the shared external network and terminates TLS; no host port is needed.
#
# Usage on that host (with a .env providing NTM_HOST + data paths):
#   docker compose -f docker-compose.yml -f compose.traefik.yml up -d --build
#
# The external network below is the network Traefik watches. Change it if your
# Traefik lives elsewhere:  docker inspect <traefik-container> -f \
#   '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
services:
  app:
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      # Which shared network Traefik should use to reach this container.
      - "traefik.docker.network=galaxy-catalog_default"
      - "traefik.http.routers.ntm.rule=Host(`${NTM_HOST}`)"
      - "traefik.http.routers.ntm.entrypoints=websecure"
      - "traefik.http.routers.ntm.tls.certresolver=myresolver"
      - "traefik.http.services.ntm.loadbalancer.server.port=8000"

networks:
  traefik:
    name: galaxy-catalog_default
    external: true
